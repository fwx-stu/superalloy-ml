name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 生成合成数据
        run: |
          python scripts/make_dataset.py

      - name: 检查数据
        run: |
          python scripts/run_data_check.py

      - name: 运行特征工程
        run: |
          python scripts/run_feature_engineering.py

      - name: 运行传统机器学习
        run: |
          python scripts/run_traditional_ml.py --no-xgboost

      - name: 运行聚类
        run: |
          python scripts/run_clustering.py

      - name: 运行降维
        run: |
          python scripts/run_dimensionality_reduction.py --tsne-perplexity 20

      - name: 运行解释性分析
        run: |
          python scripts/run_shap_analysis.py --skip-shap --no-xgboost

      - name: 汇总结果
        run: |
          python scripts/run_evaluation.py

      - name: 运行测试
        run: |
          pytest tests/